packages:
  - "packages/shared/*"
  - "packages/bc/*"
  - "packages/core/*"
  - "packages/acl/*"
  - "apps/*"

catalog:
  # Runtime
  typescript: ^5.7.0
  "@types/node": ^22.0.0
  zod: ^3.23.0

  # NestJS
  "@nestjs/common": ^10.4.0
  "@nestjs/core": ^10.4.0
  "@nestjs/platform-express": ^10.4.0
  "@nestjs/testing": ^10.4.0
  "@nestjs/trpc": ^0.4.0

  # tRPC
  "@trpc/server": ^11.0.0
  "@trpc/client": ^11.0.0

  # Database
  drizzle-orm: ^0.40.0
  drizzle-kit: ^0.28.0
  postgres: ^3.4.0

  # Messaging & Caching
  nats: ^2.28.0
  ioredis: ^5.4.0

  # Object Storage
  "@aws-sdk/client-s3": ^3.600.0

  # Auth
  passport: ^0.7.0
  passport-jwt: ^4.0.1
  "@nestjs/jwt": ^10.2.0

  # Observability
  "@opentelemetry/api": ^1.9.0
  "@opentelemetry/sdk-node": ^0.215.0

  # Kubernetes
  "@kubernetes/client-node": ^1.0.0

  # Testing
  vitest: ^3.0.0
  "@vitest/coverage-v8": ^3.0.0
  supertest: ^7.0.0
  "@playwright/test": ^1.50.0
  "@pact-foundation/pact": ^13.0.0

  # Linting
  eslint: ^9.0.0
  prettier: ^3.4.0
  oxlint: ^0.15.0
  typescript-eslint: ^8.0.0
  eslint-plugin-import: ^2.31.0
  eslint-plugin-unicorn: ^56.0.0

  # Build
  tsup: ^8.3.0
  tsx: ^4.19.0
