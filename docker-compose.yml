version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ulw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ulw
      POSTGRES_USER: ulw
      POSTGRES_PASSWORD: ulw-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ulw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ulw-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ulw-dev-password
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: ulw-nats
    restart: unless-stopped
    command: >
      --config /etc/nats/nats.conf
      --jetstream
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
      - ./docker/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: ulw-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ulw-keycloak
    restart: unless-stopped
    command:
      - "start-dev"
      - "--import-realm"
      - "--health-enabled=true"
      - "--metrics-enabled=true"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ulw
      KC_DB_USERNAME: ulw
      KC_DB_PASSWORD: ulw-dev-password
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 15

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ulw-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: ulw
      POSTGRES_USERNAME: ulw
      POSTGRES_PASSWORD: ulw-dev-password
      REDIS_URL: redis://:ulw-dev-password@redis:6379
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["pnpm", "--filter", "@ulw/api-gateway", "dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  minio_data:
    driver: local
  node_modules:
    driver: local
