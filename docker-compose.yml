version: "3.9"

services:
  openclaw:
    image: openclaw-gateway:latest
    container_name: ulw-openclaw
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:ulw-dev-password@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      KEYCLOAK_URL: http://keycloak:8080
      CONFIG_PATH: /etc/openclaw/config.yml
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./openclaw.config.yml:/etc/openclaw/config.yml:ro
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ulw-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ulw-dev-password
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: ulw-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ulw-keycloak
    restart: unless-stopped
    command:
      - "start-dev"
      - "--import-realm"
      - "--health-enabled=true"
      - "--metrics-enabled=true"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8443:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
