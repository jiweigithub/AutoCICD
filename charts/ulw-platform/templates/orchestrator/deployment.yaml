{{- if .Values.orchestrator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: ulw
  labels:
    app.kubernetes.io/component: orchestrator
    {{- include "ulw-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/component: orchestrator
        {{- include "ulw-platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: ulw-orchestrator
      containers:
        - name: orchestrator
          image: {{ include "ulw-platform.image" (dict "repository" .Values.orchestrator.image.repository "tag" .Values.orchestrator.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env: {{- include "ulw-platform.env" . | nindent 12 }}
          resources: {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
{{- end }}
