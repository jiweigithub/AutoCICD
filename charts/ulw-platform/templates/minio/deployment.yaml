{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: ulw
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
    {{- include "ulw-platform.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: storage
        {{- include "ulw-platform.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ include "ulw-platform.image" (dict "repository" .Values.minio.image.repository "tag" .Values.minio.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.minio.service.apiPort }}
              name: api
              protocol: TCP
            - containerPort: {{ .Values.minio.service.consolePort }}
              name: console
              protocol: TCP
          command: ["minio"]
          args:
            - "server"
            - "/data"
            - "--console-address"
            - ":{{ .Values.minio.service.consolePort }}"
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ulw-secrets
                  key: minio-root-password
          resources: {{- toYaml .Values.minio.resources | nindent 12 }}
          {{- if .Values.minio.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: {{ .Values.minio.service.apiPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: {{ .Values.minio.service.apiPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- if .Values.minio.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
      {{- end }}
{{- end }}
