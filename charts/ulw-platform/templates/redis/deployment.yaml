{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ulw
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    {{- include "ulw-platform.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
        {{- include "ulw-platform.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ include "ulw-platform.image" (dict "repository" .Values.redis.image.repository "tag" .Values.redis.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          command: ["redis-server"]
          args:
            - "--maxmemory"
            - {{ .Values.redis.maxmemory | quote }}
            - "--maxmemory-policy"
            - {{ .Values.redis.maxmemoryPolicy | quote }}
            - "--save"
            - "900"
            - "1"
            - "--save"
            - "300"
            - "10"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ulw-secrets
                  key: redis-password
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- if .Values.redis.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
      {{- end }}
{{- end }}
