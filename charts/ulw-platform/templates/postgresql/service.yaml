{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: ulw
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    {{- include "ulw-platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - name: postgres
      port: {{ .Values.postgresql.service.port }}
      targetPort: 5432
      protocol: TCP
{{- end }}
