{{- if .Values.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: ulw
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
    {{- include "ulw-platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: {{ .Values.nats.service.clientPort }}
      targetPort: {{ .Values.nats.service.clientPort }}
      protocol: TCP
    - name: monitoring
      port: {{ .Values.nats.service.monitoringPort }}
      targetPort: {{ .Values.nats.service.monitoringPort }}
      protocol: TCP
{{- end }}
